services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: gastos-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Gastos@Sql2024!"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Gastos@Sql2024!" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: ./backend/GastosPersonales.Api
      dockerfile: Dockerfile
    container_name: gastos-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=GastosPersonales;User Id=sa;Password=Gastos@Sql2024!;TrustServerCertificate=True;Encrypt=False;"
    ports:
      - "5000:8080"
    depends_on:
      sqlserver:
        condition: service_healthy

volumes:
  sqlserver_data:
